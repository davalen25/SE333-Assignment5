name: SE333 CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run Checkstyle
        run: mvn checkstyle:checkstyle -f amazon-tests/pom.xml
        continue-on-error: true

      - name: Upload Checkstyle Report
        uses: actions/upload-artifact@v3
        with:
          name: checkstyle-report
          path: amazon-tests/target/checkstyle-result.xml

      - name: Run Tests with JaCoCo
        run: mvn test -f amazon-tests/pom.xml

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v3
        with:
          name: jacoco-report
          path: amazon-tests/target/site/jacoco/jacoco.xml
