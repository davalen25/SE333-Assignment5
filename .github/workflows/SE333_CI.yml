name: SE333 CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run Checkstyle
        run: mvn checkstyle:checkstyle -f amazon-tests/pom.xml
        continue-on-error: true

      - name: Upload Checkstyle Report
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: amazon-tests/target/checkstyle-result.xml

      - name: Run Tests with JaCoCo
        run: mvn test -f amazon-tests/pom.xml

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: amazon-tests/target/site/jacoco/jacoco.xml

      - name: Install Playwright Browsers
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install chromium" -f playwright-tests/pom.xml

      - name: Install Chromium System Dependencies
        run: npx playwright install-deps chromium
        continue-on-error: true

      - name: Run Playwright Tests Headless
        run: mvn test -f playwright-tests/pom.xml -Dheadless=true
        continue-on-error: true

      - name: Upload Playwright Videos
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: playwright-tests/videos/
          if-no-files-found: ignore
